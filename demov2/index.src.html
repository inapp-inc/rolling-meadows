<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sign In — Rolling Meadows</title>
	<link rel="stylesheet" href="css/tokens.css">
	<link rel="stylesheet" href="css/components.css">
</head>
<body>
	<div class="sign-in-page">
		<section class="sign-in-hero" aria-label="Welcome">
			<div class="sign-in-hero-content">
				<img src="assets/rmeadows-logo.png" alt="City of Rolling Meadows" class="hero-logo">
				<div class="hero-demo-by">
					<span class="demo-by-label">Demo by</span>
					<img src="assets/inapp-logo.webp" alt="InApp" class="inapp-logo-hero">
				</div>
			</div>
		</section>
		<section class="sign-in-panel">
			<div class="sign-in-card">
				<h2>Sign in</h2>
				<p class="subtitle">Select your role to continue</p>
				<form id="sign-in-form">
					<div class="form-group">
						<label for="role-select">Your role</label>
						<select id="role-select" required aria-required="true"></select>
					</div>
					<div class="form-actions" style="border-top:none;padding-top:0">
						<button type="submit" class="btn btn-primary" style="width:100%">Continue</button>
					</div>
				</form>
			</div>
		</section>
	</div>
	<script src="js/core/store.js"></script>
	<script src="js/core/session.js"></script>
	<script src="js/core/permissions.js"></script>
	<script src="js/repositories/baseRepository.js"></script>
	<script src="js/repositories/userRepository.js"></script>
	<script src="js/repositories/clientRepository.js"></script>
	<script src="js/repositories/referralRepository.js"></script>
	<script src="js/repositories/intakeRepository.js"></script>
	<script src="js/repositories/riskAssessmentRepository.js"></script>
	<script src="js/repositories/carePlanRepository.js"></script>
	<script src="js/repositories/serviceEnrollmentRepository.js"></script>
	<script src="js/repositories/cboReferralRepository.js"></script>
	<script src="js/repositories/caseNoteRepository.js"></script>
	<script src="js/repositories/reassessmentRepository.js"></script>
	<script src="js/repositories/caseClosureRepository.js"></script>
	<script src="js/repositories/documentRepository.js"></script>
	<script src="js/core/audit.js"></script>
	<script src="js/seed/seedData.js"></script>
	<script src="js/core/init.js"></script>
	<script src="js/pages/index.js"></script>
</body>
</html>
